const SB_H = { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}`, 'Content-Type': 'application/json' };
const SB_UPS = { ...SB_H, 'Prefer': 'resolution=merge-duplicates,return=minimal' };

async function sbGet(table, params='') {
  const r = await fetch(`${SB_URL}/rest/v1/${table}${params}`, { headers: SB_H });
  if (!r.ok) throw new Error(`sbGet ${table}: ${r.status}`);
  return r.json();
}
async function sbInsert(table, row) {
  const r = await fetch(`${SB_URL}/rest/v1/${table}`, { method: 'POST', headers: SB_UPS, body: JSON.stringify(row) });
  if (!r.ok) { const t = await r.text(); throw new Error(`sbInsert ${table}: ${r.status} ${t}`); }
}
async function sbUpdate(table, id, data, idField='id') {
  const r = await fetch(`${SB_URL}/rest/v1/${table}?${idField}=eq.${id}`, { method: 'PATCH', headers: { ...SB_H, 'Prefer': 'return=minimal' }, body: JSON.stringify(data) });
  if (!r.ok) { const t = await r.text(); throw new Error(`sbUpdate ${table}: ${r.status} ${t}`); }
}
async function sbDelete(table, id, idField='id') {
  const r = await fetch(`${SB_URL}/rest/v1/${table}?${idField}=eq.${id}`, { method: 'DELETE', headers: { ...SB_H, 'Prefer': 'return=minimal' } });
  if (!r.ok) { const t = await r.text(); throw new Error(`sbDelete ${table}: ${r.status} ${t}`); }
}
async function sbUpsertConfig(data) {
  const r = await fetch(`${SB_URL}/rest/v1/config?id=eq.main`, { method: 'PATCH', headers: { ...SB_H, 'Prefer': 'return=minimal' }, body: JSON.stringify(data) });
  if (!r.ok) { const t = await r.text(); throw new Error(`sbUpsertConfig: ${r.status} ${t}`); }
}

let PERSIST_OK = true;

function migrate(db) {
  // Compatibilidad con datos guardados antes de agregar los campos nuevos.
  (db.articulos || []).forEach(a => {
    if (a.qty_real === undefined) a.qty_real = (a.cantidad !== undefined ? a.cantidad : 0);
    if (a.tipo_producto === 'Tela') a.tipo_producto = 'TELA';
    if (a.tipo_producto === 'Prenda') a.tipo_producto = 'PRENDAS';
    const UDM_LEGACY = { 'KGS': 'KG', 'MTS': 'MT', 'PCS': 'UNI', 'UN': 'UNI' };
    if (a.un_medida && UDM_LEGACY[a.un_medida.trim()]) a.un_medida = UDM_LEGACY[a.un_medida.trim()];
    if (!a.desglose_ncm) {
      a.desglose_ncm = [];
      if (a.ncm_real || a.ncm_declarar) {
        a.desglose_ncm.push({ categoria: '', ncm_real: a.ncm_real || '', ncm_declarar: a.ncm_declarar || '', qty_real: a.qty_real || 0, unitario_real: a.unitario_real ?? null, qty_aduana: a.qty_real || 0, unitario_aduana: a.unitario_aduana ?? null });
      }
    }
    a.desglose_ncm.forEach(d => {
      if (d.qty_aduana === undefined) d.qty_aduana = (d.qty !== undefined ? d.qty : 0);
      if (d.qty_real === undefined) d.qty_real = 0;
      if (d.unitario_real === undefined) d.unitario_real = null;
      if (d.unitario_aduana === undefined) d.unitario_aduana = a.unitario_aduana ?? null;
      delete d.qty;
    });
  });
  (db.cargas || []).forEach(c => {
    if (!c.etd_historial) c.etd_historial = [];
    if (c.temporada_id === undefined) c.temporada_id = null;
  });
  (db.gastos || []).forEach(g => {
    if (g.tc_manual === undefined) g.tc_manual = null;
    if (g.iva_usd === undefined) g.iva_usd = null;
    if (g.iva_adicional_usd === undefined) g.iva_adicional_usd = null;
  });
  if (!db.temporadas) db.temporadas = [];
  if (!db.nextId.temporadas) db.nextId.temporadas = (db.temporadas.reduce((max,t)=>Math.max(max,t.id),0) + 1);
  if (db.gastosHundidosPct === undefined) db.gastosHundidosPct = 8.5;
  if (!db._temporadaAutoMigrada) {
    const huerfanas = (db.cargas || []).filter(c => !c.temporada_id);
    if (huerfanas.length > 0) {
      let invierno = db.temporadas.find(t => t.nombre === 'INVIERNO 2026');
      if (!invierno) {
        invierno = { id: db.nextId.temporadas++, nombre: 'INVIERNO 2026' };
        db.temporadas.push(invierno);
      }
      huerfanas.forEach(c => { c.temporada_id = invierno.id; });
    }
    db._temporadaAutoMigrada = true;
  }
  return db;
}
function load() { return seedData(); } // fallback solo para init sync
function save() {
  // Save nextId and gastosHundidosPct to Supabase config (fire and forget)
  sbUpsertConfig({ next_id: DB.nextId, gastos_hundidos_pct: DB.gastosHundidosPct }).catch(e => console.warn('save config:', e));
  if (SHARED_MODE && SHARED_HANDLE) {
    clearTimeout(sharedSaveTimer);
    sharedSaveTimer = setTimeout(escribirArchivoCompartido, 800);
  }
}
function nextId(table) { const id = DB.nextId[table]++; save(); return id; }

let DB = load();

async function loadFromSupabase() {
  const app = document.getElementById('app');

    const [config, temporadas, cargas, articulos, categorias, gastos, tc_bna] = await Promise.all([

      sbGet('temporadas', '?order=id'),
      sbGet('cargas', '?order=id'),
      sbGet('articulos', '?order=id'),
      sbGet('categorias', '?order=id'),
      sbGet('gastos', '?order=id'),
      sbGet('tc_bna', '?order=fecha'),
    ]);
    const cfg = config[0] || {};
    DB = migrate({
      nextId: cfg.next_id || { cargas: 41, articulos: 73, gastos: 310, categorias: 8, tc_bna: 1298, temporadas: 3 },
      gastosHundidosPct: cfg.gastos_hundidos_pct ?? 8.5,
      temporadas, cargas, articulos, categorias, gastos, tc_bna,
      _temporadaAutoMigrada: true,

  } catch(e) {
    console.error('Error cargando desde Supabase:', e);
    app.innerHTML = `<div style="padding:40px;text-align:center;color:#c00">❌ Error al cargar datos: ${e.message}<br><button onclick="location.reload()">Reintentar</button></div>`;

/* ============================================================
   ARCHIVO COMPARTIDO EN RED (File System Access API — Chrome/Edge)
   ============================================================ */
let SHARED_HANDLE = null;
let SHARED_MODE = false;
let sharedLastModified = null;
let sharedSaveTimer = null;
let sharedPollTimer = null;

const IDB_NAME = 'costeo_cargas_idb';
const IDB_STORE = 'handles';
function idbOpen() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(IDB_NAME, 1);
    req.onupgradeneeded = () => req.result.createObjectStore(IDB_STORE);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}
async function idbSetHandle(handle) {
  const db = await idbOpen();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(IDB_STORE, 'readwrite');
    tx.objectStore(IDB_STORE).put(handle, 'sharedFileHandle');
    tx.oncomplete = () => resolve();
    tx.onerror = () => reject(tx.error);
  });
}
async function idbGetHandle() {
  try {
    const db = await idbOpen();
    return await new Promise((resolve, reject) => {
      const tx = db.transaction(IDB_STORE, 'readonly');
      const req = tx.objectStore(IDB_STORE).get('sharedFileHandle');
      req.onsuccess = () => resolve(req.result || null);
      req.onerror = () => reject(req.error);
    });
  } catch (e) { return null; }
}

function actualizarBotonCompartido() {
  const btn = document.getElementById('btnConectarCompartido');
  const status = document.getElementById('sharedStatus');
  if (!btn || !status) return;
  if (SHARED_MODE && SHARED_HANDLE) {
    btn.textContent = '🔗 Cambiar archivo compartido';
    status.textContent = `Compartido: ${SHARED_HANDLE.name} ✓`;
  } else {
    btn.textContent = '🔗 Conectar archivo compartido';
    status.textContent = '';
  }
}

async function conectarArchivoCompartido() {
  if (!window.showOpenFilePicker) {
    alert('Tu navegador no soporta esta función (hace falta Chrome o Edge). Mientras tanto, seguí usando "Exportar datos" / "Importar datos" para compartir manualmente.');
    return;
  }
  let handle;
  try {
    [handle] = await window.showOpenFilePicker({
      types: [{ description: 'Archivo de datos JSON', accept: {'application/json': ['.json']} }],
    });
  } catch (e) { return; } // el usuario cancelo el selector
  await activarArchivoCompartido(handle, true);
}

async function activarArchivoCompartido(handle, esConexionNueva) {
  let perm;
  try { perm = await handle.requestPermission({ mode: 'readwrite' }); }
  catch (e) { perm = await handle.queryPermission({ mode: 'readwrite' }); }
  if (perm !== 'granted') {
    if (esConexionNueva) alert('No se otorgó permiso de lectura/escritura sobre el archivo.');
    return false;
  }
  let cargarComoEsta = false;
  try {
    const file = await handle.getFile();
    const text = await file.text();
    if (text.trim()) {
      const parsed = JSON.parse(text);
      if (parsed.cargas && parsed.nextId) {
        if (!esConexionNueva || confirm(`Se va a reemplazar lo que tenés cargado ahora por el contenido de "${handle.name}". ¿Continuar?`)) {
          DB = migrate(parsed);
          cargarComoEsta = true;
        } else {
          return false;
        }
      }
    }
    sharedLastModified = file.lastModified;
  } catch (e) { console.warn('Archivo vacío o ilegible, se inicializará con los datos actuales.'); }

  SHARED_HANDLE = handle;
  SHARED_MODE = true;
  try { await idbSetHandle(handle); } catch (e) { /* no critico */ }
  if (!cargarComoEsta) await escribirArchivoCompartido(); // primera vez: siembra el archivo con los datos actuales
  iniciarPollingCompartido();
  actualizarBotonCompartido();
  renderAll();
  return true;
}

async function escribirArchivoCompartido() {
  if (!SHARED_HANDLE) return;
  try {
    const writable = await SHARED_HANDLE.createWritable();
    await writable.write(JSON.stringify(DB, null, 2));
    await writable.close();
    const file = await SHARED_HANDLE.getFile();
    sharedLastModified = file.lastModified;
  } catch (e) { console.error('No se pudo guardar en el archivo compartido:', e); }
}

function iniciarPollingCompartido() {
  if (sharedPollTimer) clearInterval(sharedPollTimer);
  sharedPollTimer = setInterval(async () => {
    if (!SHARED_HANDLE) return;
    try {
      const file = await SHARED_HANDLE.getFile();
      if (sharedLastModified && file.lastModified > sharedLastModified) {
        mostrarBannerArchivoActualizado();
      }
    } catch (e) { /* archivo movido o inaccesible */ }
  }, 20000);
}

function mostrarBannerArchivoActualizado() {
  if (document.getElementById('sharedUpdateBanner')) return;
  const el = document.createElement('div');
  el.id = 'sharedUpdateBanner';
  el.className = 'warn';
  el.style.margin = '10px 20px 0';
  el.innerHTML = '⚠ Otra persona actualizó este archivo compartido. Tus cambios locales no se perdieron, pero puede que no veas lo último. <button onclick="recargarArchivoCompartido()">Recargar ahora</button>';
  document.body.insertBefore(el, document.getElementById('mainNav'));
}

const ESTADOS_CARGA = ['Coordinación', 'Embarcada / Tránsito', 'Arribada', 'Nacionalizada', 'Depósito', 'Costeo cerrado'];
const ESTADO_BADGE = { 'Coordinación': 'b1', 'Embarcada / Tránsito': 'b2', 'Arribada': 'b3', 'Nacionalizada': 'b4', 'Depósito': 'b6', 'Costeo cerrado': 'b5' };
const TIPOS_CARGA = ['40HQ', '40STD', '20STD', 'LCL'];
const TIPOS_PRODUCTO = ['BLANQUERIA', 'PRENDAS', 'TELA'];
const CATEGORIAS_NCM = ['Blanco', 'Teñido', 'Hilo color', 'Estampado'];
const CAT_NCM_DATALIST = `<datalist id="cat-ncm-list">${CATEGORIAS_NCM.map(c=>`<option value="${c}">`).join('')}</datalist>`;
function marcaHabilitada(tipo) { return tipo === 'PRENDAS'; }
function anchoHabilitado(tipo) { return tipo === 'TELA' || tipo === 'BLANQUERIA'; }
function unidadesParaTipo(tipo) {
  if (tipo === 'TELA') return ['KG', 'MT'];
  if (tipo === 'PRENDAS') return ['UNI'];
  if (tipo === 'BLANQUERIA') return ['UNI', 'SET'];
  return [];
}

function transitDays(etd, eta) {
  if (!etd || !eta) return null;
  const d1 = new Date(etd + 'T00:00:00'), d2 = new Date(eta + 'T00:00:00');
  const diff = Math.round((d2 - d1) / 86400000);
  return isNaN(diff) ? null : diff;
}

function getTC(fechaISO) {
  const row = DB.tc_bna.find(t => t.fecha === fechaISO);
  return row ? row.valor : null;
}
function gastoTC(g) {
  if (g.estado !== 'Pagado' || !g.fecha_pago) return null;
  if (g.tc_manual !== undefined && g.tc_manual !== null) return g.tc_manual;
  return getTC(g.fecha_pago);
}
function gastoUSD(g) {
  const tc = gastoTC(g);
  if (tc === null) return null;
  return g.monto_ars / tc;
}
function gastoUSDCosteo(g) {
  const usd = gastoUSD(g);
  if (usd === null) return null;
  return usd - Number(g.iva_adicional_usd || 0);
}
function articulosDeCarga(carga_id) { return DB.articulos.filter(a => a.carga_id === carga_id); }
function gastosDeCarga(carga_id) { return DB.gastos.filter(g => g.carga_id === carga_id); }
function categoriaById(id) { return DB.categorias.find(c => c.id === id); }
function articulosResumen(carga_id) {
  const codigos = articulosDeCarga(carga_id).map(a=>a.cod_ketto).filter(Boolean);
  if (codigos.length === 0) return '—';
  if (codigos.length <= 2) return codigos.join(', ');
  return `${codigos.slice(0,2).join(', ')} +${codigos.length-2} más`;
}
function proveedoresResumen(carga_id) {
  const provs = [...new Set(articulosDeCarga(carga_id).map(a=>a.proveedor).filter(Boolean))];
  if (provs.length === 0) return '—';
  if (provs.length <= 2) return provs.join(', ');
  return `${provs.slice(0,2).join(', ')} +${provs.length-2} más`;
}

function round2(n) { return Math.round((Number(n) + Number.EPSILON) * 100) / 100; }
function qtyRealDesglose(a) {
  return round2((a.desglose_ncm || []).reduce((s, d) => s + Number(d.qty_real || 0), 0));
}
function fobRealDesglose(a) {
  return round2((a.desglose_ncm || []).reduce((s, d) => s + Number(d.qty_real || 0) * Number(d.unitario_real || 0), 0));
}
function qtyAduanaTotal(a) {
  return round2((a.desglose_ncm || []).reduce((s, d) => s + Number(d.qty_aduana || 0), 0));
}
function fobAduanaDesglose(a) {
  return round2((a.desglose_ncm || []).reduce((s, d) => s + Number(d.qty_aduana || 0) * Number(d.unitario_aduana || 0), 0));
}
function usaDesgloseReal(a) {
  return a.tipo_producto === 'TELA' && qtyRealDesglose(a) > 0;
}
function articuloFobUsd(a) {
  if (usaDesgloseReal(a)) return fobRealDesglose(a);
  const qty = Number(a.qty_real ?? a.cantidad ?? 0);
  const unit = Number(a.unitario_real ?? 0);
  if (unit) return qty * unit;
  return Number(a.fob_usd ?? 0); // compatibilidad con artículos cargados antes de que el FOB pasara a calcularse
}
function articuloQtyReal(a) {
  if (usaDesgloseReal(a)) return qtyRealDesglose(a);
  return round2(Number(a.qty_real ?? a.cantidad ?? 0));
}
function articuloUnitarioReal(a) {
  if (usaDesgloseReal(a)) {
    const qty = qtyRealDesglose(a);
    return qty ? round2(fobRealDesglose(a) / qty) : null;
  }
  return a.unitario_real ?? null;
}
function articuloFobAduana(a) {
  return fobAduanaDesglose(a);
}

function costeoDeCarga(carga_id) {
  const arts = articulosDeCarga(carga_id);
  const sumCBM = arts.reduce((s, a) => s + Number(a.cbm || 0), 0);
  const sumFOB = arts.reduce((s, a) => s + articuloFobAduana(a), 0);
  const gastos = gastosDeCarga(carga_id);

  let bucketCBM = 0, bucketFOB = 0, pendientesARS = 0, pendientesCount = 0, sinCategoria = 0, sinTC = 0;
  for (const g of gastos) {
    if (g.estado !== 'Pagado') { pendientesARS += Number(g.monto_ars || 0); pendientesCount++; continue; }
    const cat = categoriaById(g.categoria_id);
    if (!cat) { sinCategoria++; continue; }
    const usd = gastoUSDCosteo(g);
    if (usd === null) { sinTC++; continue; }
    if (cat.metodo === 'CBM') bucketCBM += usd; else bucketFOB += usd;
  }
  const totalGastosUSD = bucketCBM + bucketFOB;

  const pctHundidos = Number(DB.gastosHundidosPct || 0);
  const detalle = arts.map(a => {
    const fobUsd = articuloFobUsd(a);
    const pctCBM = sumCBM ? Number(a.cbm) / sumCBM : 0;
    const pctFOB = sumFOB ? articuloFobAduana(a) / sumFOB : 0;
    const asignado = pctCBM * bucketCBM + pctFOB * bucketFOB;
    const costoBase = fobUsd + asignado;
    const hundidosMonto = costoBase * (pctHundidos / 100);
    const costoTotal = costoBase + hundidosMonto;
    const cantidadUsada = articuloQtyReal(a);
    const fobUnitario = cantidadUsada ? fobUsd / cantidadUsada : 0;
    const costoBaseUnitario = cantidadUsada ? costoBase / cantidadUsada : 0;
    const costoUnitario = cantidadUsada ? costoTotal / cantidadUsada : 0;
    return { ...a, fob_usd: fobUsd, pctCBM, pctFOB, asignado, costoBase, hundidosMonto, costoTotal, cantidadUsada, fobUnitario, costoBaseUnitario, costoUnitario };
  });

  return { detalle, bucketCBM, bucketFOB, totalGastosUSD, pendientesARS, pendientesCount, sinCategoria, sinTC, sumCBM, sumFOB, pctHundidos };
}

const fmtUSD = n => n === null || n === undefined || isNaN(n) ? '—' : '$' + Number(n).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
const fmtARS = n => n === null || n === undefined || isNaN(n) ? '—' : Number(n).toLocaleString('es-AR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
const fmtNum = n => n === null || n === undefined || isNaN(n) ? '—' : Number(n).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
const fmtNumEdit = n => (n === null || n === undefined || n === '') ? '' : (isNaN(Number(n)) ? '' : Number(n).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 }));
const parseNum = s => { const n = parseFloat(String(s ?? '').replace(/,/g, '')); return isNaN(n) ? 0 : n; };
const parseNumOrNull = s => { const raw = String(s ?? '').replace(/,/g, '').trim(); if (raw === '') return null; const n = parseFloat(raw); return isNaN(n) ? null : n; };
const fmtPct = n => (Number(n) * 100).toFixed(1) + '%';
const fmtDate = iso => iso ? new Date(iso + 'T00:00:00').toLocaleDateString('es-AR') : '—';
function esc(s) { return String(s ?? '').replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c])); }

function articulosPorCodigo(temporadaFiltro) {
  const grupos = {};
  const cargasFiltradas = temporadaFiltro === 'todas' ? DB.cargas : DB.cargas.filter(c => (c.temporada_id||0) === temporadaFiltro);
  for (const carga of cargasFiltradas) {
    const cost = costeoDeCarga(carga.id);
    for (const d of cost.detalle) {
      const clave = (d.cod_ketto || '').trim() || `(sin código) ${d.nombre}`;
      if (!grupos[clave]) grupos[clave] = { codigo: d.cod_ketto || '', descripcion: d.nombre, instancias: [] };
      grupos[clave].instancias.push({
        cargaId: carga.id, bl: carga.bl, temporadaId: carga.temporada_id || 0,
        fobReal: d.fob_usd, fobUnitario: d.fobUnitario,
        costoTotal: d.costoTotal, cantidad: d.cantidadUsada, costoUnitario: d.costoUnitario,
      });
    }
  }
  return Object.values(grupos).map(g => {
    const sumCosto = g.instancias.reduce((s,i)=>s+i.costoTotal,0);
    const sumFobReal = g.instancias.reduce((s,i)=>s+i.fobReal,0);
    const sumCantidad = g.instancias.reduce((s,i)=>s+i.cantidad,0);
    const costoUnitarioPonderado = sumCantidad ? sumCosto/sumCantidad : 0;
    const fobUnitarioPonderado = sumCantidad ? sumFobReal/sumCantidad : 0;
    return { ...g, sumCosto, sumFobReal, sumCantidad, costoUnitarioPonderado, fobUnitarioPonderado };
  }).sort((a,b) => (a.codigo||'zzz').localeCompare(b.codigo||'zzz', undefined, {numeric:true}));
}

function viewArticulosGlobal() {
  const busqueda = (VIEW.articulosBusqueda || '').trim().toLowerCase();
  if (VIEW.articulosTemporadaFiltro === undefined || VIEW.articulosTemporadaFiltro === null) {
    // Por defecto, la temporada mas reciente (la de mayor id) — para no ponderar sin querer entre años distintos.
    VIEW.articulosTemporadaFiltro = DB.temporadas.length ? DB.temporadas.reduce((max,t)=>t.id>max.id?t:max, DB.temporadas[0]).id : 'todas';
  }
  let grupos = articulosPorCodigo(VIEW.articulosTemporadaFiltro);
  if (busqueda) {
    grupos = grupos.filter(g => (g.codigo||'').toLowerCase().includes(busqueda) || (g.descripcion||'').toLowerCase().includes(busqueda));
  }

  const rows = grupos.map(g => {
    const clave = g.codigo || `(sin código) ${g.descripcion}`;
    const expandible = g.instancias.length > 1;
    const expandido = expandible && VIEW.articulosExpandido === clave;
    const blsHtml = g.instancias
      .map(i => `<a onclick="event.stopPropagation(); openCarga(${i.cargaId},'gastos')" title="Ir al detalle de gastos">${esc(i.bl||'(Sin BL)')}</a>`)
      .join(', ');
    const codigoCelda = expandible
      ? `<button class="link" onclick="toggleArticuloGlobal('${clave.replace(/'/g,"\\'")}')" style="font-weight:bold;">${expandido?'▾':'▸'} ${esc(g.codigo || '—')}</button>`
      : `<b>${esc(g.codigo || '—')}</b>`;
    const filaPrincipal = `<tr>
      <td>${codigoCelda}</td>
      <td>${esc(g.descripcion)}</td>
      <td>${blsHtml}</td>
      <td class="num">${fmtNum(g.sumCantidad)}</td>
      <td class="num">${fmtUSD(g.fobUnitarioPonderado)}</td>
      <td class="num"><b>${fmtUSD(g.costoUnitarioPonderado)}</b>${expandible ? ' <span class="muted" title="Promedio ponderado por cantidad entre varios BL">⚖</span>' : ''}</td>
    </tr>`;
    const filaDetalle = expandido ? `<tr class="no-print-collapse"><td colspan="6" style="padding:0; background:#fafbfc;">
      <table class="compact" style="margin:6px 10px; width:calc(100% - 20px);">
        <thead><tr><th>BL</th><th class="num">Cantidad</th><th class="num">FOB Real Unitario (USD)</th><th class="num">Costo Unitario (USD)</th></tr></thead>
        <tbody>
          ${g.instancias.map(i => `<tr>
            <td><a onclick="openCarga(${i.cargaId},'gastos')">${esc(i.bl||'(Sin BL)')}</a></td>
            <td class="num">${fmtNum(i.cantidad)}</td>
            <td class="num">${fmtUSD(i.fobUnitario)}</td>
            <td class="num">${fmtUSD(i.costoUnitario)}</td>
          </tr>`).join('')}
        </tbody>
      </table>
    </td></tr>` : '';
    return filaPrincipal + filaDetalle;
  }).join('');

  const opcionesTemporada = `
    <option value="todas" ${VIEW.articulosTemporadaFiltro==='todas'?'selected':''}>Todas las temporadas</option>
    ${DB.temporadas.map(t=>`<option value="${t.id}" ${t.id===VIEW.articulosTemporadaFiltro?'selected':''}>${esc(t.nombre)}</option>`).join('')}
    <option value="0" ${VIEW.articulosTemporadaFiltro===0?'selected':''}>(Sin temporada asignada)</option>
  `;
  const temporadaFiltroNombre = VIEW.articulosTemporadaFiltro === 'todas' ? 'Todas las temporadas'
    : VIEW.articulosTemporadaFiltro === 0 ? '(Sin temporada asignada)'
    : (DB.temporadas.find(t=>t.id===VIEW.articulosTemporadaFiltro)?.nombre || '—');

  return `
  <div class="card no-print">
    <h2>Costos por artículo</h2>

    </div>
  </div>
  <div class="card">
    <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px;">

      <button class="no-print" onclick="window.print()">🖨 Exportar a PDF</button>
    </div>
    ${grupos.length === 0 ? '<div class="empty">No hay artículos que coincidan.</div>' : `
    <div style="overflow-x:auto; margin-top:10px;">
    <table class="compact">
      <thead><tr>
        <th>Código</th><th>Descripción</th><th>BL(s)</th>
        <th class="num">Cantidad</th><th class="num">FOB Real Unitario (USD)</th><th class="num">Costo Unitario (USD)</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>
    </div>`}
    <p class="footer-note">⚖ = el código aparece en más de un BL; el valor es el promedio ponderado por cantidad. Hacé clic en el código (▸) para ver el detalle por BL, o en un BL para ir directo a su detalle de gastos.</p>
  </div>`;
}

function temporadaStats(temporadaId) {
  const cargas = DB.cargas.filter(c => (c.temporada_id||0) === temporadaId);
  const totalCosto = cargas.reduce((s, c) => {
    const cost = costeoDeCarga(c.id);
    return s + cost.detalle.reduce((s2, d) => s2 + d.costoTotal, 0);
  }, 0);
  return { count: cargas.length, totalCosto };
}

function viewTemporadasList() {

async function addTemporada() {
  const nombre = document.getElementById('tf_temporada_nombre').value.trim();
  if (!nombre) { alert('Ingresá un nombre para la temporada'); return; }
  const id = nextId('temporadas');
  const row = { id, nombre };
  DB.temporadas.push(row);
  await sbInsert('temporadas', row).catch(e => console.warn('addTemporada:', e));
  openTemporada(id);
}
async function deleteTemporada(id) {
  if (!confirm('¿Eliminar esta temporada? Las cargas que la usan quedarán sin temporada asignada (no se borran).')) return;
  DB.temporadas = DB.temporadas.filter(t=>t.id!==id);
  DB.cargas.forEach(c => { if (c.temporada_id === id) c.temporada_id = null; });
  await sbDelete('temporadas', id).catch(e => console.warn('deleteTemporada:', e));
  renderAll();
}

/* ============================================================
   VISTA: LISTADO DE CARGAS
   ============================================================ */
function viewCargasList(temporadaId) {
  const temporada = temporadaId > 0 ? DB.temporadas.find(t=>t.id===temporadaId) : null;
  const temporadaNombre = temporadaId > 0 ? (temporada ? temporada.nombre : '—') : '(Sin temporada asignada)';
  const embarqueDeCarga = c => c.fecha_embarque || c.etd || null;
  const cargasFiltradas = DB.cargas
    .filter(c => (c.temporada_id||0) === temporadaId)
    .filter(c => !VIEW.estadoFiltro || c.estado === VIEW.estadoFiltro)
    .slice()
    .sort((a, b) => {
      const fa = embarqueDeCarga(a), fb = embarqueDeCarga(b);
      if (!fa && !fb) return 0;
      if (!fa) return 1;
      if (!fb) return -1;
      return fa < fb ? -1 : (fa > fb ? 1 : 0);
    });

  let totalFobReal = 0, totalGastos = 0, totalHundidos = 0, totalGeneral = 0;
  const rows = cargasFiltradas.map(c => {
    const cost = costeoDeCarga(c.id);
    const totalCosto = cost.detalle.reduce((s, d) => s + d.costoTotal, 0);
    const fobRealCarga = cost.detalle.reduce((s, d) => s + articuloFobUsd(d), 0);
    const hundidosCarga = cost.detalle.reduce((s, d) => s + d.hundidosMonto, 0);
    const nArts = cost.detalle.length;
    totalFobReal += fobRealCarga;
    totalGastos += cost.totalGastosUSD;
    totalHundidos += hundidosCarga;
    totalGeneral += totalCosto;
    const warn = cost.pendientesCount > 0 ? `<span class="muted" title="Gastos aún no pagados, no incluidos en el costeo">⚠ ${cost.pendientesCount} pend.</span>` : '';
    const embarque = embarqueDeCarga(c);
    return `<tr>
      <td title="${esc(c.nro_orden_naviera||'')}">${esc(c.nro_orden_naviera||'—')}</td>
      <td title="${esc(c.bl||'')}"><b>${c.bl ? esc(c.bl) : '<span class="muted">(Sin BL)</span>'}</b></td>
      <td title="${esc(c.buque||'')}">${esc(c.buque||'—')}</td>
      <td title="${esc(proveedoresResumen(c.id))}">${esc(proveedoresResumen(c.id))}</td>
      <td title="${esc(articulosResumen(c.id))}">${esc(articulosResumen(c.id))}</td>
      <td>${fmtDate(embarque)}</td>
      <td>${fmtDate(c.eta)}</td>
      <td title="${esc(c.estado)}"><span class="badge ${ESTADO_BADGE[c.estado]||'b1'}">${esc(c.estado)}</span></td>
      <td class="num">${nArts}</td>
      <td class="num">${fmtUSD(fobRealCarga)}</td>
      <td class="num">${fmtUSD(cost.totalGastosUSD)}</td>
      <td class="num">${fmtUSD(hundidosCarga)}</td>
      <td class="num">${warn}</td>
      <td class="num"><b>${fmtUSD(totalCosto)}</b></td>
      <td class="row-actions no-print">
        <button class="link" onclick="openCarga(${c.id})" title="Ver detalle">Ver</button>
        <button class="link danger" onclick="deleteCarga(${c.id})" title="Eliminar">🗑</button>
      </td>
    </tr>`;
  }).join('');

  return `
  <div class="breadcrumb no-print"><a onclick="closeTemporada()">← Volver a Temporadas</a></div>
  <div class="card no-print">
    <h2>Nueva carga (BL) <span class="muted">— ${esc(temporadaNombre)}</span></h2>
    <div class="form-grid">
      <div><label>N° de BL <span class="muted">(si todavía no lo tenés, dejalo en blanco)</span></label><input id="nf_bl" placeholder="Ej: MSCU1234567"></div>
      <div><label>Fecha de embarque</label><input id="nf_fecha" type="date"></div>
      <div><label>ETA (estimada)</label><input id="nf_eta" type="date"></div>
      <div><label>Estado</label>
        <select id="nf_estado">${ESTADOS_CARGA.map(e=>`<option>${e}</option>`).join('')}</select>
      </div>
      <div><button class="primary" onclick="addCarga()">+ Agregar carga</button></div>
    </div>
  </div>
  <div class="card">
    <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px;">
      <h2 style="margin:0;">Cargas marítimas — ${esc(temporadaNombre)} (${cargasFiltradas.length})${VIEW.estadoFiltro ? ` <span class="muted" style="font-weight:normal; font-size:12px;">· filtrado por ${esc(VIEW.estadoFiltro)}</span>` : ''}</h2>
      <div class="no-print" style="display:flex; gap:8px; align-items:center;">
        <select onchange="setEstadoFiltro(this.value)" style="width:auto;">
          <option value="">Todos los estados</option>
          ${ESTADOS_CARGA.map(e=>`<option ${e===VIEW.estadoFiltro?'selected':''}>${e}</option>`).join('')}
        </select>
        <button onclick="window.print()">🖨 Exportar a PDF</button>
      </div>
    </div>
    <div class="grid2" style="margin-top:14px;">
      <div class="muted">FOB real total: <b>${fmtUSD(totalFobReal)}</b></div>
      <div class="muted">Gastos pagados total: <b>${fmtUSD(totalGastos)}</b></div>
      <div class="muted">Gastos hundidos total: <b>${fmtUSD(totalHundidos)}</b></div>
      <div class="muted" style="grid-column: 1 / -1;">Costo total: <b>${fmtUSD(totalGeneral)}</b></div>
    </div>
    ${cargasFiltradas.length === 0 ? '<div class="empty">No hay cargas que coincidan con el filtro aplicado.</div>' : `
    <div style="overflow-x:auto; margin-top:10px;">
    <table class="compact fixed-cols">
      <colgroup>
        <col style="width:4%"><col style="width:9%"><col style="width:8%"><col style="width:9%">
        <col style="width:6%"><col style="width:6%"><col style="width:6%"><col style="width:7%">
        <col style="width:3%"><col style="width:8%"><col style="width:8%"><col style="width:8%">
        <col style="width:4%"><col style="width:9%"><col style="width:5%">
      </colgroup>
      <thead><tr>
        <th>N° int.</th><th>BL</th><th>Buque</th><th>Proveedor(es)</th><th>Artículo(s)</th>
        <th>Embarque</th><th>ETA</th><th>Estado</th>
        <th class="num">Art.</th><th class="num">FOB Real (USD)</th><th class="num">Gastos (USD)</th><th class="num">Gastos Hundidos (USD)</th><th></th>
        <th class="num">Total (USD)</th><th class="no-print"></th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>
    </div>`}
    <p class="footer-note">El costo total solo incluye gastos marcados como "Pagado". Los pendientes se muestran aparte y no afectan el costeo hasta que se paguen. "Embarque" muestra la fecha real; si todavía no la tenés, muestra el ETD estimado.</p>
  </div>`;
}

async function addCarga() {
  const bl = document.getElementById('nf_bl').value.trim();
  const id = nextId('cargas');
  const row = {
    id, bl,
    temporada_id: VIEW.temporadaId || null,
    fecha_embarque: document.getElementById('nf_fecha').value || null,
    eta: document.getElementById('nf_eta').value || null,
    estado: document.getElementById('nf_estado').value,
    nro_orden_naviera: '', nro_contenedor: '', tipo_carga: '', buque: '',
    puerto_origen: '', terminal: '', forwarder: '', etd: '',
    fecha_despacho: '', nro_despacho: '', valor_flete_ref: null, comentarios: '', etd_historial: [],
  };
  DB.cargas.push(row);
  await sbInsert('cargas', row).catch(e => console.warn('addCarga:', e));
  renderAll();
}
async function deleteCarga(id) {
  if (!confirm('¿Eliminar esta carga? También se borran sus artículos y gastos asociados.')) return;
  DB.cargas = DB.cargas.filter(c => c.id !== id);
  DB.articulos = DB.articulos.filter(a => a.carga_id !== id);
  DB.gastos = DB.gastos.filter(g => g.carga_id !== id);
  await sbDelete('cargas', id).catch(e => console.warn('deleteCarga:', e));
  renderAll();
}

function updCarga(id, field, value) {
  const c = DB.cargas.find(x=>x.id===id);
  if (!c) return;
  if (field === 'etd' && (c.etd || '') !== value) {
    if (!c.etd_historial) c.etd_historial = [];
    c.etd_historial.push({ fecha_cambio: new Date().toISOString().slice(0,10), etd_anterior: c.etd || null, etd_nuevo: value || null });
    sbUpdate('cargas', id, { etd_historial: c.etd_historial }).catch(e => console.warn('updCarga etd_historial:', e));
  }
  c[field] = value;
  sbUpdate('cargas', id, { [field]: value }).catch(e => console.warn('updCarga:', e));
  renderAll();
}

    <td class="num"><input type="text" inputmode="decimal" value="${fmtNumEdit(d.qty_aduana)}" onchange="updDesgloseNcm(${a.id},${idx},'qty_aduana',parseNum(this.value))" style="text-align:right; width:100px"></td>
    <td class="num"><input type="text" inputmode="decimal" value="${fmtNumEdit(d.unitario_aduana)}" onchange="updDesgloseNcm(${a.id},${idx},'unitario_aduana',parseNumOrNull(this.value))" style="text-align:right; width:100px"></td>
    <td><button class="link danger" onclick="deleteDesgloseNcm(${a.id},${idx})">Eliminar</button></td>

  const totalReal = qtyRealDesglose(a);

  return `
    <h4>Desglose de NCM por color / tipo</h4>
    <p class="footer-note">La composición es la misma para todos los colores; lo que cambia es la NCM según el acabado (blanco, teñido, hilo color, estampado) — y a veces también el precio real o de aduana de esa posición. Cargá cada posición como una línea, con su propia cantidad y precio.</p>
    ${CAT_NCM_DATALIST}
    ${lineas.length ? `<div style="overflow-x:auto;"><table><thead><tr><th>Categoría</th><th>NCM real</th><th>NCM a declarar en BL</th><th class="num">Qty Real</th><th class="num">Unitario Real</th><th class="num">Qty Aduana</th><th class="num">Unitario Aduana</th><th></th></tr></thead><tbody>${rows}</tbody></table></div>` : '<div class="empty">Sin líneas de NCM cargadas todavía.</div>'}
    <div style="margin-top:8px;"><button onclick="addDesgloseNcm(${a.id})">+ Agregar línea de NCM</button></div>
    ${lineas.length>0 ? `<p class="footer-note" style="margin-top:8px;">Qty Total Real (suma de líneas): ${fmtNum(totalReal)} — Qty Total Aduana (suma de líneas): ${fmtNum(totalAduana)}.</p>` : ''}
  `;
}
function addDesgloseNcm(articuloId) {
  const a = DB.articulos.find(x=>x.id===articuloId);
  if (!a) return;
  if (!a.desglose_ncm) a.desglose_ncm = [];
  a.desglose_ncm.push({ categoria: '', ncm_real: '', ncm_declarar: '', qty_real: 0, unitario_real: null, qty_aduana: 0, unitario_aduana: null });
  sbUpdate('articulos', articuloId, { desglose_ncm: a.desglose_ncm }).catch(e => console.warn('addDesgloseNcm:', e));
  renderAll();
}
function updDesgloseNcm(articuloId, idx, field, value) {
  const a = DB.articulos.find(x=>x.id===articuloId);
  if (!a || !a.desglose_ncm || !a.desglose_ncm[idx]) return;
  a.desglose_ncm[idx][field] = value;
  sbUpdate('articulos', articuloId, { desglose_ncm: a.desglose_ncm }).catch(e => console.warn('updDesgloseNcm:', e));
  renderAll();
}
function deleteDesgloseNcm(articuloId, idx) {
  const a = DB.articulos.find(x=>x.id===articuloId);
  if (!a || !a.desglose_ncm) return;
  a.desglose_ncm.splice(idx, 1);
  sbUpdate('articulos', articuloId, { desglose_ncm: a.desglose_ncm }).catch(e => console.warn('deleteDesgloseNcm:', e));
  renderAll();
}
function updDesgloseUnico(articuloId, field, value) {
  const a = DB.articulos.find(x=>x.id===articuloId);
  if (!a) return;
  if (!a.desglose_ncm || a.desglose_ncm.length === 0) a.desglose_ncm = [{ categoria: '', ncm_real: '', ncm_declarar: '', qty_real: 0, unitario_real: null, qty_aduana: 0, unitario_aduana: null }];
  a.desglose_ncm[0][field] = value;
  sbUpdate('articulos', articuloId, { desglose_ncm: a.desglose_ncm }).catch(e => console.warn('updDesgloseUnico:', e));
  renderAll();
}

function updateArticuloTipoFields() {
  const tipo = document.getElementById('af_tipo_producto')?.value;
  const marca = document.getElementById('af_marca');
  const ancho = document.getElementById('af_ancho');
  const udm = document.getElementById('af_un_medida');
  if (marca) marca.disabled = !marcaHabilitada(tipo);
  if (ancho) ancho.disabled = !anchoHabilitado(tipo);
  if (udm) {
    const opts = unidadesParaTipo(tipo);
    udm.innerHTML = '<option value="">—</option>' + opts.map(u=>`<option>${u}</option>`).join('');
    udm.disabled = opts.length === 0;
  }
  const esTela = tipo === 'TELA';
  document.querySelectorAll('.aduana-simple').forEach(el => { el.style.display = esTela ? 'none' : ''; });
  const nota = document.getElementById('af_aduana_tela_note');
  if (nota) nota.style.display = esTela ? 'block' : 'none';
  updateFobAduanaPreview();
}
function updateFobAduanaPreview() {
  const tipo = document.getElementById('af_tipo_producto')?.value;
  const unit = Number(document.getElementById('af_unitario_aduana')?.value) || 0;
  const qty = (tipo === 'TELA') ? 0 : (Number(document.getElementById('af_qty_aduana_simple')?.value) || 0);
  const preview = document.getElementById('af_fob_aduana_preview');
  if (preview) preview.value = fmtNum(qty * unit);
}
function updateFobPreview() {
  const qty = Number(document.getElementById('af_qty_real')?.value) || 0;
  const unit = Number(document.getElementById('af_unitario_real')?.value) || 0;
  const preview = document.getElementById('af_fob_preview');
  if (preview) preview.value = fmtNum(qty * unit);
}
async function addArticulo(cargaId) {
  const nombre = document.getElementById('af_nombre').value.trim();
  if (!nombre) { alert('Ingresá la descripción del artículo'); return; }
  const val = idPrefix => document.getElementById(idPrefix).value.trim();
  const num = idPrefix => { const v = Number(document.getElementById(idPrefix).value); return isNaN(v) ? 0 : v; };
  const numOrNull = idPrefix => { const raw = document.getElementById(idPrefix).value; if (raw === '') return null; const v = Number(raw); return isNaN(v) ? null : v; };
  const id = nextId('articulos');
  const tipoSel = document.getElementById('af_tipo_producto').value;
  const desgloseInicial = (tipoSel === 'TELA') ? [] : [{
    categoria: '',
    ncm_real: val('af_ncm_real_simple'),
    ncm_declarar: val('af_ncm_declarar_simple'),
    qty_real: num('af_qty_real'),
    unitario_real: numOrNull('af_unitario_real'),
    qty_aduana: num('af_qty_aduana_simple'),
    unitario_aduana: numOrNull('af_unitario_aduana'),
  }];
  const row = {
    id, carga_id: cargaId, nombre,
    cbm: num('af_cbm'),
    proveedor: val('af_proveedor'),
    cod_proveedor: val('af_cod_proveedor'),
    cod_ketto: val('af_cod_ketto'),
    marca: val('af_marca'),
    tipo_producto: tipoSel,
    ancho: val('af_ancho'),
    gsm: val('af_gsm'),
    nro_pi: val('af_nro_pi'),
    qty_compra: num('af_qty_compra'),
    qty_real: num('af_qty_real'),
    un_medida: val('af_un_medida'),
    unitario_real: numOrNull('af_unitario_real'),
    unitario_aduana: numOrNull('af_unitario_aduana'),
    ncm_real: '',
    ncm_declarar: '',
    desglose_ncm: desgloseInicial,
    composicion_real: val('af_composicion_real'),
    composicion_etiqueta: val('af_composicion_etiqueta'),
  };
  DB.articulos.push(row);
  await sbInsert('articulos', row).catch(e => console.warn('addArticulo:', e));
  renderAll();
}
function updArticulo(id, field, value) {
  const a = DB.articulos.find(x=>x.id===id);
  if (!a) return;
  a[field] = value;
  sbUpdate('articulos', id, { [field]: value }).catch(e => console.warn('updArticulo:', e));
  renderAll();
}
async function deleteArticulo(id) {
  if (!confirm('¿Eliminar este artículo?')) return;
  DB.articulos = DB.articulos.filter(a=>a.id!==id);
  await sbDelete('articulos', id).catch(e => console.warn('deleteArticulo:', e));
  renderAll();
}

    return `<tr>
      <td>${cat?esc(cat.nombre):'<span class="muted">sin categoría</span>'}</td>

      <td class="num"><input type="text" inputmode="decimal" value="${g.iva_usd!=null ? fmtNumEdit(g.iva_usd) : ''}" placeholder="—" onchange="setIvaInfo(${g.id}, this.value)" style="width:90px; text-align:right" title="Cuánto de este gasto es IVA, a nivel informativo. Ya está incluido en el Monto ARS — esto NO se resta del costeo."></td>
      <td class="num"><input type="text" inputmode="decimal" value="${g.iva_adicional_usd!=null ? fmtNumEdit(g.iva_adicional_usd) : ''}" placeholder="—" onchange="setIvaAdicional(${g.id}, this.value)" style="width:90px; text-align:right" title="IVA Adicional del despacho (percepción), sin relación con el producto. Este monto SÍ se resta del costeo."></td>
      <td class="num">${usd!==null ? fmtUSD(usd) : (g.estado==='Pagado' ? '<span class="muted">sin TC</span>' : '—')}${(g.iva_adicional_usd) ? `<div class="muted" style="font-size:11px;">costeable: ${fmtUSD(usdCosteo)}</div>` : ''}</td>

      <div><label>Monto (ARS)</label><input id="gf_monto" type="number" step="0.01"></div>

  </div>
  <div class="card">
    ${gastos.length===0 ? '<div class="empty">Sin gastos cargados.</div>' : `

      <th>Categoría</th><th>Fecha FC</th><th>N° FC</th><th class="num">Monto ARS</th><th>Obs.</th>

    </div>`}

    <td class="num">${fmtNum(d.cantidadUsada)}</td>
    <td class="num"><b>${fmtUSD(d.costoUnitario)}</b></td>

  if (r.sinCategoria>0) warnings.push(`${r.sinCategoria} gasto(s) sin categoría válida — no se pudieron prorratear.`);
  if (r.sinTC>0) warnings.push(`${r.sinTC} gasto(s) pagado(s) sin TC BNA cargado para su fecha de pago — no se convirtieron a USD. Cargalos en la pestaña "Tipo de Cambio".`);

  return `

    <h2>Costeo — bolsas de gastos prorrateados</h2>
    <div class="grid2">
      <div class="muted">Gastos generales (CBM): <b>${fmtUSD(r.bucketCBM)}</b> (Σ CBM artículos: ${fmtNum(r.sumCBM)})</div>
      <div class="muted">Nacionalización + Ajuste de valor (FOB Aduana): <b>${fmtUSD(r.bucketFOB)}</b> (Σ FOB Aduana artículos: ${fmtUSD(r.sumFOB)})</div>
      <div class="muted" style="grid-column: 1 / -1;">Gastos hundidos: <b>${r.pctHundidos}%</b> sobre FOB real + gastos asignados (estructura, alquiler, empleados, gastos bancarios)</div>
    </div>
    ${warnings.map(w=>`<div class="warn">⚠ ${w}</div>`).join('')}
  </div>
  <div class="card">
    <h2>Costo por artículo</h2>
    ${r.detalle.length===0 ? '<div class="empty">Cargá artículos primero.</div>' : `
    <div style="overflow-x:auto;">
    <table><thead><tr>
      <th>Artículo</th><th class="num">FOB Real USD</th><th class="num">FOB Unitario USD</th>
      <th class="num">% CBM</th><th class="num">% FOB Aduana</th><th class="num">Gastos asignados</th>
      <th class="num">Costo base USD</th><th class="num">Gastos hundidos (${r.pctHundidos}%)</th><th class="num">Costo total USD</th>
      <th class="num">Qty real</th><th class="num">Costo unitario USD</th>
    </tr></thead><tbody>${rows}</tbody></table>
    </div>`}
    <p class="footer-note">Costo total = FOB real + gastos generales (CBM) + nacionalización y ajuste de valor (FOB Aduana) + ${r.pctHundidos}% de gastos hundidos. El costo unitario usa la Qty Total Real de cada artículo.</p>
  </div>`;
}

/* ============================================================
   VISTA: CATEGORIAS
   ============================================================ */
function viewCategorias() {
  const rows = DB.categorias.map(c => `<tr>
    <td>${esc(c.nombre)}</td>
    <td><span class="badge ${c.metodo==='CBM'?'b2':'b3'}">${c.metodo}</span></td>
    <td><button class="link danger" onclick="deleteCategoria(${c.id})">Eliminar</button></td>
  </tr>`).join('');
  return `
  <div class="card">
    <h2>Gastos hundidos</h2>
    <div class="form-grid">
      <div><label>Porcentaje sobre el costo (FOB real + gastos asignados)</label>
        <input type="text" inputmode="decimal" value="${fmtNumEdit(DB.gastosHundidosPct)}" onchange="setGastosHundidosPct(this.value)" style="max-width:120px">
      </div>
    </div>
    <p class="footer-note">Se suma automáticamente al costo final de cada artículo para cubrir estructura, alquiler, empleados y gastos bancarios. Se aplica sobre el costo antes de gastos hundidos (FOB real + gastos generales + nacionalización + ajuste de valor).</p>
  </div>
  <div class="card">
    <h2>Nueva categoría de gasto</h2>
    <div class="form-grid">
      <div><label>Nombre</label><input id="cf_nombre" placeholder="Ej: Flete Marítimo"></div>
      <div><label>Método de prorrateo</label><select id="cf_metodo"><option>CBM</option><option>FOB</option></select></div>
      <div><button class="primary" onclick="addCategoria()">+ Agregar</button></div>
    </div>
  </div>
  <div class="card">
    <h2>Categorías (${DB.categorias.length})</h2>
    <p class="footer-note">Cada categoría define cómo se reparte ese gasto entre los artículos de una carga: por % de CBM (volumen) o por % de FOB (valor declarado en aduana, no el FOB real).</p>
    ${DB.categorias.length===0 ? '<div class="empty">Sin categorías.</div>' : `
    <table><thead><tr><th>Categoría</th><th>Método</th><th></th></tr></thead><tbody>${rows}</tbody></table>`}
  </div>`;
}
function setGastosHundidosPct(value) {
  const n = parseNumOrNull(value);
  DB.gastosHundidosPct = n === null ? 0 : n;
  sbUpsertConfig({ gastos_hundidos_pct: DB.gastosHundidosPct }).catch(e => console.warn('setGastosHundidosPct:', e));
  renderAll();
}
async function addCategoria() {
  const nombre = document.getElementById('cf_nombre').value.trim();
  if (!nombre) { alert('Ingresá un nombre'); return; }
  const id = nextId('categorias');
  const row = { id, nombre, metodo: document.getElementById('cf_metodo').value };
  DB.categorias.push(row);
  await sbInsert('categorias', row).catch(e => console.warn('addCategoria:', e));
  renderAll();
}
async function deleteCategoria(id) {
  if (!confirm('¿Eliminar esta categoría? Los gastos que la usan quedarán sin categoría.')) return;
  DB.categorias = DB.categorias.filter(c=>c.id!==id);
  await sbDelete('categorias', id).catch(e => console.warn('deleteCategoria:', e));
  renderAll();
}

/* ============================================================
   VISTA: TIPO DE CAMBIO BNA
   ============================================================ */
function viewTC() {
  const sorted = [...DB.tc_bna].sort((a,b)=> a.fecha < b.fecha ? 1 : -1);
  const rows = sorted.map(t => `<tr>
    <td>${fmtDate(t.fecha)}</td>
    <td class="num">${fmtARS(t.valor)}</td>
    <td><button class="link danger" onclick="deleteTC(${t.id})">Eliminar</button></td>
  </tr>`).join('');
  const today = new Date().toISOString().slice(0,10);
  return `
  <div class="card">
    <h2>Cargar tipo de cambio BNA (venta)</h2>
    <p class="footer-note">Pegá acá a diario el valor que sacás de la planilla de Dolarbot (no se pudo vincular en vivo un archivo de tu red desde este entorno).</p>
    <div class="form-grid">
      <div><label>Fecha</label><input id="tf_fecha" type="date" value="${today}"></div>
      <div><label>TC BNA venta</label><input id="tf_valor" type="number" step="0.01"></div>
      <div><button class="primary" onclick="addTC()">+ Agregar / actualizar</button></div>
    </div>
  </div>
  <div class="card">
    <h2>Historial de TC BNA (${DB.tc_bna.length})</h2>
    ${sorted.length===0 ? '<div class="empty">Sin valores cargados.</div>' : `
    <table><thead><tr><th>Fecha</th><th class="num">TC BNA venta</th><th></th></tr></thead><tbody>${rows}</tbody></table>`}
  </div>`;
}
async function addTC() {
  const fecha = document.getElementById('tf_fecha').value;
  const valor = Number(document.getElementById('tf_valor').value);
  if (!fecha || !valor) { alert('Completá fecha y valor'); return; }
  const existing = DB.tc_bna.find(t=>t.fecha===fecha);
  if (existing) {
    existing.valor = valor;
    await sbUpdate('tc_bna', existing.id, { valor }).catch(e => console.warn('addTC update:', e));
  } else {
    const id = nextId('tc_bna');
    DB.tc_bna.push({ id, fecha, valor });
    await sbInsert('tc_bna', { id, fecha, valor }).catch(e => console.warn('addTC insert:', e));
  }
  renderAll();
}
async function deleteTC(id) {
  if (!confirm('¿Eliminar este valor de TC?')) return;
  DB.tc_bna = DB.tc_bna.filter(t=>t.id!==id);
  await sbDelete('tc_bna', id).catch(e => console.warn('deleteTC:', e));
  renderAll();
}

/* ============================================================
   EXPORT / IMPORT
   ============================================================ */
function exportData() {
  const blob = new Blob([JSON.stringify(DB, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'costeo_cargas_backup_' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
  URL.revokeObjectURL(url);
}
function importData(evt) {
  const file = evt.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const data = JSON.parse(reader.result);
      if (!data.cargas || !data.nextId) throw new Error('Formato inválido');
      if (!confirm('Esto reemplaza todos los datos actuales por los del archivo importado. ¿Continuar?')) return;
      DB = migrate(data);
      save();
      goTab('cargas');
    } catch(e) {
      alert('No se pudo leer el archivo: ' + e.message);
    }
  };
  reader.readAsText(file);
  evt.target.value = '';
}

/* ============================================================
   INIT
   ============================================================ */
loadFromSupabase();
</script>
