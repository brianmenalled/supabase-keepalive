name: Supabase Keep Alive

on:
  schedule:
    - cron: '0 9 */2 * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Install PostgreSQL client
        run: sudo apt-get install -y postgresql-client

      - name: Ping Supabase via Postgres (IPv4 forced)
        run: |
          # Resolve IPv4 address explicitly
          DB_HOST="db.xsjeyqnpppnuojfeeglp.supabase.co"
          IPV4=$(getent ahostsv4 "$DB_HOST" | head -1 | awk '{print $1}')
          echo "Connecting to $DB_HOST via IPv4: $IPV4"
          PGPASSWORD="Patrimonio753951!" psql \
            "postgresql://postgres:Patrimonio753951!@$IPV4:5432/postgres" \
            -c "UPDATE patrimonio SET updated_at = NOW() WHERE id = 'main';"
          echo "Postgres ping OK"
