name: Supabase Keep Alive

on:
  schedule:
    - cron: '0 9 */2 * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Install PostgreSQL client
        run: sudo apt-get install -y postgresql-client

      - name: Ping Supabase via direct Postgres connection
        run: |
          PGPASSWORD="Patrimonio753951!" psql \
            "postgresql://postgres:Patrimonio753951!@db.xsjeyqnpppnuojfeeglp.supabase.co:5432/postgres" \
            -c "UPDATE patrimonio SET updated_at = NOW() WHERE id = 'main';"
          echo "Postgres ping OK"
