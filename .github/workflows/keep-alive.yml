name: Supabase Keep Alive

on:
  schedule:
    - cron: '0 9 */2 * *'  # Cada 2 dias a las 9am UTC
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase PATRIMONIO
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X PATCH \
            "https://xsjeyqnpppnuojfeeglp.supabase.co/rest/v1/patrimonio?id=eq.main" \
            -H "apikey: sb_publishable_UzLgldTW5IMBamWuAsm7AQ_ah7h3jfa" \
            -H "Authorization: Bearer sb_publishable_UzLgldTW5IMBamWuAsm7AQ_ah7h3jfa" \
            -H "Content-Type: application/json" \
            -d '{"updated_at":"'$(date -u +%Y-%m-%dT%H:%M:%SZ)'"}')
          echo "Supabase ping status: $STATUS"
          if [ "$STATUS" != "204" ] && [ "$STATUS" != "200" ]; then
            echo "ERROR: Unexpected status $STATUS"
            exit 1
          fi
          echo "OK - Supabase is alive"
