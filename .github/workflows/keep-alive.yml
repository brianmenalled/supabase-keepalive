name: Supabase Keep Alive

on:
  schedule:
    - cron: '0 9 */2 * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Install tools
        run: sudo apt-get install -y postgresql-client dnsutils

      - name: Ping Supabase via Postgres IPv4
        run: |
          DB_HOST="db.xsjeyqnpppnuojfeeglp.supabase.co"
          IPV4=$(dig +short A $DB_HOST | head -1)
          echo "Resolved $DB_HOST to IPv4: $IPV4"
          if [ -z "$IPV4" ]; then
            echo "ERROR: Could not resolve IPv4"
            exit 1
          fi
          PGPASSWORD="Patrimonio753951!" psql \
            "postgresql://postgres:Patrimonio753951!@$IPV4:5432/postgres" \
            -c "UPDATE patrimonio SET updated_at = NOW() WHERE id = 'main';" \
            --no-password
          echo "Postgres ping OK"
