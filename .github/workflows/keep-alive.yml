name: Supabase Keep Alive
on:
  schedule:
    - cron: '0 9 */2 * *'
  workflow_dispatch:

env:
  SB_T1: "sbp_95cc22cb"
  SB_T2: "ed17893f912d36225dfbf6b064e130b7"
  # PATRIMONIO
  API_KEY_PAT: "sb_publishable_UzLgldTW5IMBamWuAsm7AQ_ah7h3jfa"
  PROJECT_PAT: "xsjeyqnpppnuojfeeglp"
  # STATUS COMEX
  API_KEY_COM: "sb_publishable_QzPcc8tirq3MhR3KUrzQqg_j1ktAJEf"
  PROJECT_COM: "vkpbyyclghbihglewipb"

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping PATRIMONIO via REST PATCH
        run: |
          STATUS=$(curl -s -o /tmp/r1.txt -w "%{http_code}" -X PATCH \
            "https://$PROJECT_PAT.supabase.co/rest/v1/patrimonio?id=eq.main" \
            -H "apikey: $API_KEY_PAT" \
            -H "Authorization: Bearer $API_KEY_PAT" \
            -H "Content-Type: application/json" \
            -d "{\"updated_at\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}")
          echo "PATRIMONIO REST PATCH: $STATUS"; cat /tmp/r1.txt

      - name: Ping PATRIMONIO via Management API SQL
        run: |
          SB_TOKEN="${SB_T1}${SB_T2}"
          STATUS=$(curl -s -o /tmp/r2.txt -w "%{http_code}" -X POST \
            "https://api.supabase.com/v1/projects/$PROJECT_PAT/database/query" \
            -H "Authorization: Bearer $SB_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"query":"UPDATE patrimonio SET updated_at = NOW() WHERE id = '"'"'main'"'"';"}')
          echo "PATRIMONIO SQL status: $STATUS"; cat /tmp/r2.txt

      - name: Ping STATUS COMEX via REST PATCH
        run: |
          STATUS=$(curl -s -o /tmp/r3.txt -w "%{http_code}" -X PATCH \
            "https://$PROJECT_COM.supabase.co/rest/v1/config?id=eq.main" \
            -H "apikey: $API_KEY_COM" \
            -H "Authorization: Bearer $API_KEY_COM" \
            -H "Content-Type: application/json" \
            -d "{\"updated_at\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}")
          echo "STATUS COMEX REST PATCH: $STATUS"; cat /tmp/r3.txt

      - name: Ping STATUS COMEX via Management API SQL
        run: |
          SB_TOKEN="${SB_T1}${SB_T2}"
          STATUS=$(curl -s -o /tmp/r4.txt -w "%{http_code}" -X POST \
            "https://api.supabase.com/v1/projects/$PROJECT_COM/database/query" \
            -H "Authorization: Bearer $SB_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"query":"UPDATE config SET updated_at = NOW() WHERE id = '"'"'main'"'"';"}')
          echo "STATUS COMEX SQL status: $STATUS"; cat /tmp/r4.txt
