name: Supabase Keep Alive

on:
  schedule:
    - cron: '0 9 */2 * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Install PostgreSQL client
        run: sudo apt-get install -y postgresql-client

      - name: Ping Supabase via Postgres (IPv4)
        run: |
          DB_HOST="db.xsjeyqnpppnuojfeeglp.supabase.co"
          # Force IPv4 resolution using python3
          IPV4=$(python3 -c "import socket; print(socket.getaddrinfo('$DB_HOST', 5432, socket.AF_INET)[0][4][0])")
          echo "Resolved IPv4: $IPV4"
          PGPASSWORD="Patrimonio753951!" psql \
            "postgresql://postgres:Patrimonio753951!@$IPV4:5432/postgres?sslmode=require" \
            -c "UPDATE patrimonio SET updated_at = NOW() WHERE id = 'main'; SELECT updated_at FROM patrimonio WHERE id = 'main';"
          echo "Postgres ping OK"
