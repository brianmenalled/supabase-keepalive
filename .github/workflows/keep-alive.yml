name: Supabase Keep Alive

on:
  schedule:
    - cron: '0 9 */2 * *'
  workflow_dispatch:

env:
  SB_T1: "sbp_95cc22cb"
  SB_T2: "ed17893f912d36225dfbf6b064e130b7"
  API_KEY: "sb_publishable_UzLgldTW5IMBamWuAsm7AQ_ah7h3jfa"
  PROJECT: "xsjeyqnpppnuojfeeglp"

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping via REST PATCH
        run: |
          STATUS=$(curl -s -o /tmp/r1.txt -w "%{http_code}" -X PATCH \
            "https://$PROJECT.supabase.co/rest/v1/patrimonio?id=eq.main" \
            -H "apikey: $API_KEY" \
            -H "Authorization: Bearer $API_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"updated_at\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}")
          echo "REST PATCH: $STATUS"; cat /tmp/r1.txt

      - name: Ping via Management API SQL
        run: |
          SB_TOKEN="${SB_T1}${SB_T2}"
          STATUS=$(curl -s -o /tmp/r2.txt -w "%{http_code}" -X POST \
            "https://api.supabase.com/v1/projects/$PROJECT/database/query" \
            -H "Authorization: Bearer $SB_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"query":"UPDATE patrimonio SET updated_at = NOW() WHERE id = '"'"'main'"'"';"}')
          echo "SQL status: $STATUS"; cat /tmp/r2.txt
