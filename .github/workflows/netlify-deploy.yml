name: Deploy STATUS COMEX to Netlify
on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Install Netlify CLI
        run: npm install -g netlify-cli
        
      - name: Deploy to Netlify
        run: |
          # Use netlify deploy with auth token from environment
          # First get auth token via login
          cat status-comex-app.html | wc -c
          netlify deploy --dir=. --site=iridescent-shortbread-547661 --auth="${{ secrets.NETLIFY_TOKEN }}" --message="STATUS COMEX app deploy" 2>&1 || echo "Deploy attempt done"

