name: Deploy STATUS COMEX to Netlify
on:
  workflow_dispatch:
    inputs:
      netlify_token:
        description: "Netlify Personal Access Token"
        required: true
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Create ZIP
        run: |
          cp status-comex-app.html index.html
          zip deploy.zip index.html
          ls -la deploy.zip
          
      - name: Get site info
        run: |
          TOKEN="${{ github.event.inputs.netlify_token }}"
          echo "Getting sites list..."
          curl -s -H "Authorization: Bearer $TOKEN" \
            "https://api.netlify.com/api/v1/sites?filter=all&per_page=20" | python3 -c "
import sys,json
sites = json.load(sys.stdin)
for s in sites:
    print(s.get(\"id\"), \"|\", s.get(\"name\"), \"|\", s.get(\"ssl_url\",\"\"))
"
          
      - name: Deploy to Netlify via API
        run: |
          SITE_SLUG="iridescent-shortbread-547661"
          TOKEN="${{ github.event.inputs.netlify_token }}"
          
          echo "Getting site ID for $SITE_SLUG..."
          SITE_ID=$(curl -s -H "Authorization: Bearer $TOKEN" \
            "https://api.netlify.com/api/v1/sites?filter=all&per_page=20" | python3 -c "
import sys,json
sites = json.load(sys.stdin)
for s in sites:
    if s.get(\"name\") == \"$SITE_SLUG\" or s.get(\"id\") == \"$SITE_SLUG\":
        print(s.get(\"id\"))
        break
")
          echo "Site ID: $SITE_ID"
          
          RESPONSE=$(curl -s -X POST \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/zip" \
            --data-binary @deploy.zip \
            "https://api.netlify.com/api/v1/sites/$SITE_ID/deploys")
          
          echo "Response: $RESPONSE"
