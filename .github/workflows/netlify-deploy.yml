name: Deploy STATUS COMEX to Netlify
on:
  workflow_dispatch:
    inputs:
      netlify_token:
        description: "Netlify Personal Access Token"
        required: true
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Create ZIP
        run: |
          cp status-comex-app.html index.html
          zip deploy.zip index.html
          ls -la deploy.zip
          
      - name: Deploy to Netlify via API
        run: |
          SITE_ID="iridescent-shortbread-547661"
          TOKEN="${{ github.event.inputs.netlify_token }}"
          
          echo "Deploying to site $SITE_ID..."
          
          RESPONSE=$(curl -s -X POST \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/zip" \
            --data-binary @deploy.zip \
            "https://api.netlify.com/api/v1/sites/$SITE_ID/deploys")
          
          echo "Response: $RESPONSE"
          
          # Check for error
          echo "$RESPONSE" | python3 -c "
import sys,json
d=json.load(sys.stdin)
if d.get('error'):
    print('ERROR:', d['error'])
    exit(1)
else:
    print('Deploy ID:', d.get('id',?))
    print('State:', d.get('state',?))
    print('URL:', d.get('ssl_url',?))
"

