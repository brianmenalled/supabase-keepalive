name: Deploy STATUS COMEX
on:
  workflow_dispatch:
    inputs:
      netlify_token:
        description: "Netlify Personal Access Token"
        required: true
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Create ZIP
        run: |
          cp status-comex-app.html index.html
          zip deploy.zip index.html
          echo "ZIP created: $(wc -c < deploy.zip) bytes"
          
      - name: Deploy to Netlify
        env:
          NETLIFY_AUTH_TOKEN: ${{ github.event.inputs.netlify_token }}
          SITE_ID: iridescent-shortbread-547661
        run: |
          echo "Deploying to Netlify..."
          RESP=$(curl -s -X POST \
            -H "Authorization: Bearer ${NETLIFY_AUTH_TOKEN}" \
            -H "Content-Type: application/zip" \
            --data-binary @deploy.zip \
            "https://api.netlify.com/api/v1/sites/${SITE_ID}/deploys")
          echo "Response: $RESP"
          STATE=$(echo "$RESP" | grep -o '"state":"[^"]*"' | head -1)
          ID=$(echo "$RESP" | grep -o '"id":"[^"]*"' | head -1)
          echo "State: $STATE"
          echo "ID: $ID"
